version: 0.2
policy:
  no_paywall_bypass: true
  no_login_scraping: true
  no_unauthorized_database_access: true
  every_material_claim_needs_document_id: true
sources:
  gov_cn_policy:
    label: 国务院政策文件库
    tier: P0
    source_category: official_policy
    base_url: https://sousuo.www.gov.cn/zcwjk/
    allowed_domains:
      - sousuo.www.gov.cn
      - www.gov.cn
    refresh_cadence: daily
    parser: generic_html
    access_policy: public_only_no_login
    topics:
      - central_policy
      - evidence_chain
      - policy_signal_auxiliary
    seed_keywords:
      - 补贴
      - 税收优惠
      - 研发费用加计扣除
      - 贴息
      - 引导基金
      - 土地供应
      - 债转股
      - 集成电路
      - 软件
      - 新能源汽车
      - 生物医药
    sample_items:
      - title: 关于做好2026年享受税收优惠政策的集成电路企业或项目、软件企业清单制定工作的通知
        url: https://www.ndrc.gov.cn/
        issuer:
          - 国家发展改革委
          - 工业和信息化部
          - 财政部
          - 税务总局
        published_at: "2026-04-07"
        body: 集成电路企业、软件企业可按规定享受税收优惠政策，相关企业清单按年度组织制定。
