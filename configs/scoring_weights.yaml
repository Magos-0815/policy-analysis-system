version: 0.2
contract: state_support_intensity_v1

# Auxiliary policy-signal weights. These do not define the V1 State Support
# Intensity formula and must not be added directly to amount-based SSI values.
issuer_weight:
  国务院: 1.5
  国务院办公厅: 1.4
  国家发展改革委: 1.2
  工业和信息化部: 1.2
  财政部: 1.2
  税务总局: 1.2
  中国人民银行: 1.2
  default: 1.0
instrument_weight:
  direct_subsidy: 1.5
  r_and_d_tax_incentive: 1.45
  government_financed_berd: 1.35
  other_tax_incentive: 1.35
  credit_subsidy: 1.35
  guidance_fund: 1.3
  land_subsidy: 1.25
  soe_net_payables: 1.1
  debt_equity_swap: 1.05
  default: 1.0
evidence_quality:
  official_policy: 1.0
  policy_interpretation: 0.75
  news_release: 0.55
recency:
  half_life_days: 365

# V1 SSI calculation weights. Implementation must expose these as configurable
# methodology inputs and run sensitivity checks against equal/gdp/confidence
# alternatives before publication.
state_support_intensity:
  method_version: ssi_v1
  default_weighting_mode: expert_default
  channel_weight:
    direct_subsidy: 0.16
    r_and_d_tax_incentive: 0.12
    government_financed_berd: 0.10
    other_tax_incentive: 0.12
    credit_subsidy: 0.15
    guidance_fund: 0.10
    land_subsidy: 0.10
    soe_net_payables: 0.08
    debt_equity_swap: 0.07
  industry_weight:
    semiconductor: 0.14
    software: 0.12
    ev: 0.12
    manufacturing: 0.18
    energy: 0.12
    biotech: 0.10
    finance: 0.08
    real_estate_construction: 0.08
    agriculture: 0.06
  sensitivity_modes:
    - equal_weight
    - gdp_share
    - confidence_weighted
